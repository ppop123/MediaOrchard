name: release-check

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: release-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-check:
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install release dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install -U pip
          .venv/bin/python -m pip install -e ".[dev]"

      - name: Run release gate
        run: PYTHON_FOR_VENV=.venv/bin/python bash scripts/release_check.sh
